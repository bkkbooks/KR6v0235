body:
  text: 夫脩心始行必資願表表願功能道由生養生養之功謂之塔像故八塔顯自碧林影髮著之香樹是使見形立善範像流今若非曠積深因慈悲宿造則必弱喪忘歸長迷誰覺唯雅見君子能改步迷方控平軒於一乘移心弱喪汎神舟於三路是以獲嘉縣東清流福地號曰安村有大檀主置立尼寺有故天宮一區年久事遐神功頓毀寶色莊嚴散靈像於輕塵陵雲雅製落真儀於重壤玉地深經髣髴若存寶相祇林神容中斷乃復道俗一百餘人發悟自心輕財重道捨身命財共脩故塔始末十旬微功乃就復妙相於靈山還湛一於雙樹義感去來精貫現在邈象護於金經超名敕於玉牒釋梵來儀乘碧霧以通煙四王效像曜五花於日月淨水香雲若離復合異物芬芳殊方恒在金剛豈遠此地長春十種莊嚴事同紫岸因茲業也一百人等發斯洪願願令皇家寶運深基道契二儀之堅玉蒂金根福同九山之宅異物諍祥雲華帝門奇競像風翻上國破四魔於五雲拔三鋒於四濘甘露淨音導一乘於方方法水金開灌千迷於莫二三有一歸同軒佛寶哀鸞和雅調八梵於清蓮冥讚空絃妙龍舟於幽俗往聖所以懸苻來賢所以共一思報四恩常脩度火劍自消三途永息莫不盡化還无妙鄰二智滅諦夷然誰非佛者奉慈氏於初覺會千佛於淨年正心正見唯願如是唯大魏天平四年歲次丁巳七月甲午朔廿五日戊午
